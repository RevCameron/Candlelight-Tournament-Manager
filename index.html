<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Candlelight Tournament Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Candlelight Tournament Manager</h1>

  <div id="setup">
    <h2>Create Event</h2>

    <label>Game Mode:</label>
    <select id="gameMode">
      <option value="mtg">MTG Commander</option>
      <option value="swu">SWU Twin Suns</option>
    </select>

    <br>

    <label>Number of Rounds:</label>
    <input type="number" id="roundCount" min="1" max="10">

    <br>

    <button onclick="createEvent()">Start Event</button>
  </div>

  <div id="playerSection" style="display:none;">
    <h2>Register Players</h2>

    <input type="text" id="playerName" placeholder="Player Name">
    <button onclick="addPlayer()">Add Player</button>

    <ul id="playerList"></ul>

    <button onclick="beginTournament()">Begin Tournament</button>
  </div>

  <div id="standingsSection" style="display:none;">
    <h2>Standings</h2>
    <table id="standingsTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Match Points</th>
          <th>OMW%</th>
          <th>GW%</th>
          <th>OGW%</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
