<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candlelight Tournament Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Candlelight Tournament Manager</h1>

    <!-- ===================== -->
    <!-- SETUP SCREEN -->
    <!-- ===================== -->
    <div id="setup">
        <h2>Create Event</h2>

        <label for="gameMode">Game Mode:</label>
        <select id="gameMode">
            <option value="MTG Commander">MTG Commander</option>
            <option value="Twin Suns">Twin Suns</option>
        </select>

        <br><br>

        <label for="roundCount">Number of Rounds:</label>
        <input type="number" id="roundCount" value="3" min="1">

        <br><br>

        <button onclick="createTournament()">Start Event</button>
    </div>


    <!-- ===================== -->
    <!-- REGISTRATION SCREEN -->
    <!-- ===================== -->
    <div id="registration" style="display:none;">
        <h2>Player Registration</h2>

        <input 
            type="text" 
            id="playerName" 
            placeholder="Enter player name"
            onkeydown="if(event.key === 'Enter') addPlayer();"
        >

        <button type="button" onclick="addPlayer()">Add Player</button>

        <ul id="playerList"></ul>

        <br>

        <button onclick="startRounds()">Start Tournament</button>
    </div>


    <!-- ===================== -->
    <!-- TOURNAMENT SCREEN -->
    <!-- ===================== -->
    <div id="tournament" style="display:none;">
        <div id="pairings"></div>

        <h2>Standings</h2>

        <table id="standingsTable" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Match Points</th>
                    <th>OMW%</th>
                    <th>GW%</th>
                    <th>OGW%</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>

</body>
</html>
