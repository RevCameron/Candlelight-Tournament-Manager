<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candlelight Tournament Manager</title>
<style>
body { font-family: Arial, sans-serif; padding:20px; }
h1,h2 { margin-bottom:10px; }
button { padding:6px 12px; margin-top:8px; }
input, select { padding:5px; margin:5px 0; }
.pod { border:1px solid #ccc; padding:15px; margin-bottom:15px; border-radius:8px; }
.player-option { margin:5px 0; }
table { border-collapse: collapse; margin-top:15px; }
th, td { border:1px solid #ccc; padding:6px 10px; text-align:center; }
.locked { opacity:0.6; pointer-events:none; }
</style>
</head>
<body>

<h1>Candlelight Tournament Manager</h1>

<div id="setup">
  <h2>Create Event</h2>

  <label>Tournament Name:</label><br>
  <input type="text" id="tournamentName"><br>

  <label>Game:</label><br>
  <select id="gameSelect">
    <option value="commander">MTG Commander</option>
    <option value="twin">SWU Twin Suns</option>
  </select><br>

  <label>Number of Rounds:</label><br>
  <input type="number" id="roundCount" value="3" min="1" max="10"><br>

  <button onclick="createTournament()">Start Event</button>
</div>

<div id="registration" style="display:none;">
  <h2>Player Registration</h2>

  <input type="text"
         id="playerName"
         placeholder="Enter player name"
         onkeydown="if(event.key==='Enter'){addPlayer()}">

  <button onclick="addPlayer()">Add Player</button>

  <ul id="playerList"></ul>

  <button onclick="startTournament()">Start Tournament</button>
</div>

<div id="tournament" style="display:none;">
  <h2 id="roundHeader"></h2>
  <div id="pairings"></div>

  <button id="nextRoundBtn" onclick="generateNextRound()" disabled>
    Generate Next Round
  </button>

  <h2>Standings</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Points</th>
        <th>OMW%</th>
        <th>GW%</th>
        <th>OGW%</th>
      </tr>
    </thead>
    <tbody id="standingsBody"></tbody>
  </table>
</div>

<script src="script.js"></script>
</body>
</html>
