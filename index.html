<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candlelight Tournament Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
    <header class="app-header">
        <img src="assets/logo.png" class="logo">
        <h1>Candlelight Tournament Manager</h1>
    </header>

    <div id="setup" class="panel">
        <h2>Create Event</h2>

        <label for="gameMode">Game Mode:</label>
        <select id="gameMode">
            <option value="MTG Commander">MTG Commander</option>
            <option value="Twin Suns">SWU Twin Suns</option>
        </select>
        
        <label for="tournamentName">Tournament Name:</label>
        <input type="text" id="tournamentName" placeholder="Enter tournament name">
        
        <label for="roundCount">Number of Rounds:</label>
        <input type="number" id="roundCount" value="3" min="1" max="10">

        <input type="file" id="saveFile">
        <button onclick="importTournamentSave()">Load Tournament</button>

        <button onclick="createTournament()">Start Event</button>
    </div>

    <div id="registration" class="panel" style="display:none;">
    <h2>Player Registration</h2>
    
    <div style="margin-bottom: 15px; border: 1px solid #ddd; padding: 10px;">
        <label>Import Roster (.csv/.json):</label><br>
        <input type="file" id="rosterFile">
        <button onclick="importRoster()">Import</button>
    </div>

    <input type="text" id="playerName" placeholder="Enter player name">
    <button onclick="addPlayer()">Add Player</button>

    <ul id="playerList"></ul>

    <div class="actions">
        <button id="printRosterBtn" onclick="printRoster()">Print Roster</button>
        <button id="startTournamentBtn" class="primary" onclick="confirmStartTournament()" style="display:none;">Start Tournament</button>
    </div>
</div>

<div id="tournament" class="panel" style="display:none;">
    <div class="main-tabs">
        <button onclick="openMainTab('roundTab')">Current Round</button>
        <button onclick="openMainTab('playersTab')">Players</button>
        <button onclick="openMainTab('standingsTab')">Standings</button>
        <input type="text" id="tournamentFastCode" placeholder="Fast Code: 112341">
    </div>

    <button id="nextRoundButton" class="primary" onclick="nextRound()" disabled>Next Round</button>
</div>

    <div id="tournamentPortal" class="panel" style="display:none;">
        <div class="portal-header">
            <h2 id="portalTournamentName"></h2>
            <div class="portal-actions">
                <select id="printMenu" onchange="handlePrintMenu()">
                    <option value="">Print...</option>
                    <option value="roster">Roster</option>
                    <option value="pairings">Current Pairings</option>
                    <option value="slips">Current Match Slips</option>
                    <option value="standings">Standings</option>
                </select>
                <button onclick="saveTournament()">Save Tournament</button>
                <input type="text" id="tournamentFastCode" placeholder="Enter Fast Code..." style="width:150px;">
                <button onclick="applyTournamentFastCodes()">Apply</button>
            </div>
        </div>

        <div class="main-tabs">
            <button class="tab-button active-tab" onclick="openMainTab('roundTab')">Rounds</button>
            <button class="tab-button" onclick="openMainTab('playersTab')">Player Management</button>
            <button class="tab-button" onclick="openMainTab('standingsTab')">Standings</button>
        </div>

        <div id="roundTab" class="main-tab">
            <h2 id="roundHeader"></h2>
            <div id="roundTabs" class="round-tabs"></div>
            <div id="roundControls" class="round-controls"></div>
            <div id="pairings"></div>
        </div>

        <div id="playersTab" class="main-tab" style="display:none;">
            <h2>Player Management</h2>
            <table id="playerManagementTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="standingsTab" class="main-tab" style="display:none;">
            <h2>Standings</h2>
            <table id="standingsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Match Points</th>
                        <th>OMW%</th>
                        <th>GW%</th>
                        <th>OGW%</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
