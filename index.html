<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candlelight Tournament Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
    <header class="app-header">
        <img src="assets/logo.png" class="logo">
        <h1>Candlelight Tournament Manager</h1>
    </header>

    <div id="setup" class="panel">
        <h2>Create Event</h2>

        <label for="gameMode">Game Mode:</label>
        <select id="gameMode">
            <option value="MTG Commander">MTG Commander</option>
            <option value="Twin Suns">SWU Twin Suns</option>
        </select>
        
        <label for="tournamentName">Tournament Name:</label>
        <input type="text" id="tournamentName" placeholder="Enter tournament name">
        
        <label for="roundCount">Number of Rounds:</label>
        <input type="number" id="roundCount" value="3" min="1" max="10">

        <div style="margin-top: 15px;">
            <label>Load existing save:</label>
            <input type="file" id="saveFile" accept=".json">
            <button class="secondary-button" onclick="importTournamentSave()">Load Tournament</button>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <button style="width: 100%; padding: 15px;" onclick="createTournament()">Start New Event</button>
    </div>

    <div id="registration" class="panel" style="display:none;">
        <h2>Player Registration</h2>

        <div style="display: flex; gap: 8px;">
            <input
                type="text"
                id="playerName"
                style="flex-grow: 1;"
                placeholder="Enter player name"
                onkeydown="if(event.key === 'Enter') { event.preventDefault(); addPlayer(); }"
            >
            <button type="button" onclick="addPlayer()">Add Player</button>
        </div>

        <div style="margin: 10px 0;">
            <button class="secondary-button" onclick="importMeleeRoster()">Import Melee Roster</button>
        </div>

        <ul id="playerList"></ul>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="secondary-button" onclick="printRoster()">Print Roster</button>
            <button onclick="confirmStartTournament()">Start Tournament</button>
        </div>
    </div>

    <div id="tournament" class="panel" style="display:none;">
        
        <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
            <div id="fastResultControls">
                <label for="tournamentFastCode"><strong>Fast Result Entry</strong> (e.g., <code>112341</code>)</label><br>
                <input
                    id="tournamentFastCode"
                    type="text"
                    placeholder="Round+Pod+Results"
                    onkeypress="if(event.key === 'Enter'){event.preventDefault(); applyTournamentFastCodes();}"
                >
                <button onclick="applyTournamentFastCodes()">Apply</button>
            </div>

            <div style="display: flex; gap: 8px;">
                <select id="printMenu" onchange="handlePrintMenu()">
                    <option value="">Print...</option>
                    <option value="pairings">Round Pairings</option>
                    <option value="slips">Match Slips</option>
                    <option value="standings">Standings</option>
                    <option value="roster">Roster</option>
                </select>
                <button class="secondary-button" onclick="saveTournament()">Save</button>
                <button id="nextRoundButton" style="display: none;" onclick="nextRound()">Generate Next Round</button>
            </div>
        </div>

        <div class="main-tabs">
            <button class="tab-button active-tab" onclick="openMainTab('roundTab')">Current Round</button>
            <button class="tab-button" onclick="openMainTab('playersTab')">Players</button>
